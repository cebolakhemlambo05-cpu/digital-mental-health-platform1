<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitala Mental Health Platform - Admin Login</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="auth-layout">
        <section class="auth-card">
            <div class="auth-brand">
                <h1>Digitala Mental Health Platform</h1>
                <p>Admin access only. Enter your credentials to continue.</p>
            </div>

            <div id="errorMessage" class="form-error"></div>

            <form id="loginForm" action="admin-login.php" method="post" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Admin@123" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
        </section>
    </div>

    <script src="admin-login.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const errorElement = document.getElementById('errorMessage');
        if (params.get('error') === '1') {
            errorElement.innerText = 'Invalid username or password. Please try again.';
        }
        if (params.get('logout') === '1') {
            errorElement.innerText = 'You have been logged out successfully.';
        }
        if (params.get('error') === 'expired') {
            errorElement.innerText = 'Session expired. Please sign in again.';
        }
    </script>
</body>
</html>
